<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Urban Heat Explorer 3D | Andrew Galas</title>
  <!-- CesiumJS Library -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      background-color: #081c3b;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Corporate Navy & Silver Glassmorphism Panel */
    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 320px;
      background: rgba(8, 28, 59, 0.90);
      border: 1px solid #c0c7d0;
      border-radius: 8px;
      padding: 18px;
      color: #ffffff;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .control-panel h2 {
      margin: 0 0 4px 0;
      font-size: 1.3rem;
      color: #ffffff;
    }

    .control-panel p {
      margin: 0 0 14px 0;
      font-size: 0.82rem;
      color: #c0c7d0;
      line-height: 1.3;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c0c7d0;
      margin-bottom: 4px;
    }

    .form-control {
      width: 100%;
      padding: 8px 10px;
      background-color: #00529b;
      border: 1px solid #c0c7d0;
      border-radius: 4px;
      color: #ffffff;
      font-size: 0.9rem;
      outline: none;
    }

    .btn-action {
      width: 100%;
      padding: 10px;
      background: #00529b;
      border: 1px solid #c0c7d0;
      border-radius: 4px;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s ease;
    }

    .btn-action:hover {
      background: #003a6e;
    }

    .results-card {
      margin-top: 14px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.25);
      border-left: 3px solid #00529b;
      border-radius: 4px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="control-panel">
    <h2>Urban Heat Explorer</h2>
    <p>3D Land Surface Temperature (LST) & Heat Island Analysis</p>

    <div class="form-group">
      <label for="citySelect">Target City</label>
      <select id="citySelect" class="form-control">
        <option value="chapel_hill">Chapel Hill, NC</option>
        <option value="raleigh">Raleigh, NC</option>
        <option value="charlotte">Charlotte, NC</option>
        <option value="atlanta">Atlanta, GA</option>
        <option value="chicago" selected>Chicago, IL</option>
        <option value="phoenix">Phoenix, AZ</option>
      </select>
    </div>

    <div class="form-group">
      <label for="yearSelect">Year</label>
      <select id="yearSelect" class="form-control">
        <option value="2024" selected>2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
      </select>
    </div>

    <div class="form-group">
      <label for="seasonSelect">Season</label>
      <select id="seasonSelect" class="form-control">
        <option value="Summer" selected>Summer</option>
        <option value="Spring">Spring</option>
        <option value="Fall">Fall</option>
        <option value="Winter">Winter</option>
      </select>
    </div>

    <button id="loadBtn" class="btn-action" onclick="updateCityView()">Load 3D Heat Map</button>

    <div id="resultsCard" class="results-card">
      <strong>Active Parameters:</strong><br>
      <span id="activeInfo">Chicago, IL • Summer 2024</span>
    </div>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // Cesium Token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmYzQ3OTFiOS0yYmVhLTRjYTktYmU0OS1iMjVjODM1MGZkNDUiLCJpZCI6NDU5MzUxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODQ3MzU2OTV9.oNJoQMHC6Vh4sBGQMgGBBcIhApR1o_1vAwLtLwOl97M';

    const cityCoords = {
      'chapel_hill': { lon: -79.0558, lat: 35.9132, name: 'Chapel Hill, NC' },
      'raleigh':     { lon: -78.6382, lat: 35.7796, name: 'Raleigh, NC' },
      'charlotte':   { lon: -80.8431, lat: 35.2271, name: 'Charlotte, NC' },
      'atlanta':     { lon: -84.3880, lat: 33.7490, name: 'Atlanta, GA' },
      'chicago':     { lon: -87.6298, lat: 41.8781, name: 'Chicago, IL' },
      'phoenix':     { lon: -112.0740, lat: 33.4484, name: 'Phoenix, AZ' }
    };

    let viewer;

    async function init3DGlobe() {
      // Initialize 3D Globe with World Terrain
      viewer = new Cesium.Viewer('cesiumContainer', {
        terrain: Cesium.Terrain.fromWorldTerrain(),
        animation: false,
        timeline: false,
        baseLayerPicker: false
      });

      // Fly to initial default city (Chicago)
      updateCityView();
    }

    function updateCityView() {
      const cityKey = document.getElementById('citySelect').value;
      const year = document.getElementById('yearSelect').value;
      const season = document.getElementById('seasonSelect').value;
      const target = cityCoords[cityKey];

      document.getElementById('activeInfo').innerText = `${target.name} • ${season} ${year}`;

      // 3D Orbital Fly-To Perspective
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat - 0.08, 12000), // Latitude tilt offset & 12km height
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-35), // 3D Camera Tilt
          roll: 0.0
        },
        duration: 2.5
      });
    }

    init3DGlobe();
  </script>
</body>
</html>
