<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Night Lights & Urban Elevation Explorer | Andrew Galas</title>

    <!-- CesiumJS CSS & JavaScript -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --chase-navy: #0a192f;
            --chase-blue: #00529b;
            --chase-light-blue: #0076d6;
            --chase-silver: #c0c0c0;
            --panel-bg: rgba(10, 25, 47, 0.92);
            --panel-border: rgba(192, 192, 192, 0.25);
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --glow-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: var(--text-main);
        }

        /* Top Navigation Overlay */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .brand-badge {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .brand-badge h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-badge h1 span {
            color: var(--chase-light-blue);
        }

        .brand-badge p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .nav-actions {
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        .btn-back {
            background: var(--chase-blue);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            background: var(--chase-light-blue);
            transform: translateY(-1px);
        }

        /* Control Panel Window */
        .control-panel {
            position: absolute;
            top: 90px;
            right: 20px;
            width: 330px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            border-radius: 10px;
            padding: 20px;
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .panel-header {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--chase-silver);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            margin-bottom: 18px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .control-group label span.val {
            color: var(--chase-light-blue);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            accent-color: var(--chase-light-blue);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .toggle-row span {
            font-size: 0.825rem;
            color: #e2e8f0;
        }

        /* Custom Switch Button */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--chase-blue);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Preset Navigation Grid */
        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 9px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .preset-btn:hover {
            background: var(--chase-blue);
            border-color: var(--chase-light-blue);
        }

        .action-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, #00529b 0%, #0076d6 100%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        /* Bottom Info Overlay */
        .hud-overlay {
            position: absolute;
            bottom: 25px;
            left: 20px;
            z-index: 100;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--chase-silver);
            pointer-events: none;
        }

        /* Cesium Widget UI Customization */
        .cesium-viewer-animationContainer, 
        .cesium-viewer-timelineContainer,
        .cesium-viewer-bottom {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="brand-badge">
            <h1>Geospatial <span>3D Night Lights</span> Explorer</h1>
            <p>Urban Density, Terrain Elevation & Remote Sensing Analysis</p>
        </div>
        <div class="nav-actions">
            <a href="index.html" class="btn-back">&larr; Return to Portfolio</a>
        </div>
    </div>

    <!-- Interactive Controls Drawer -->
    <div class="control-panel">
        <div class="panel-header">Layer Controls</div>

        <div class="toggle-row">
            <span>Nighttime Imagery</span>
            <label class="switch">
                <input type="checkbox" id="toggleNightLights" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-group">
            <label>Night Light Opacity <span class="val" id="lightOpacityVal">90%</span></label>
            <input type="range" id="lightOpacity" min="0" max="100" value="90">
        </div>

        <div class="toggle-row">
            <span>3D Buildings (OSM)</span>
            <label class="switch">
                <input type="checkbox" id="toggleBuildings" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-row">
            <span>Building Night Glow</span>
            <label class="switch">
                <input type="checkbox" id="toggleGlow" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-row">
            <span>Terrain Wireframe</span>
            <label class="switch">
                <input type="checkbox" id="toggleTerrain">
                <span class="slider"></span>
            </label>
        </div>

        <div class="panel-header" style="margin-top: 20px;">Hotspot Navigation</div>
        <div class="preset-grid">
            <button class="preset-btn" onclick="flyToLocation(41.8827, -87.6233, 1200, -18, 45)">Chicago, USA</button>
            <button class="preset-btn" onclick="flyToLocation(40.7128, -74.0060, 1400, -18, 30)">New York City</button>
            <button class="preset-btn" onclick="flyToLocation(35.6762, 139.6503, 1600, -20, 15)">Tokyo, Japan</button>
            <button class="preset-btn" onclick="flyToLocation(25.2048, 55.2708, 1600, -18, 60)">Dubai, UAE</button>
            <button class="preset-btn" onclick="flyToLocation(51.5074, -0.1278, 1500, -20, 0)">London, UK</button>
            <button class="preset-btn" onclick="flyToGlobalView()">Global Reset</button>
            <button class="preset-btn action-btn" id="orbitBtn" onclick="toggleCameraOrbit()">🎥 Toggle Cinematic Orbit</button>
        </div>
    </div>

    <!-- HUD Metrics Overlay -->
    <div class="hud-overlay" id="hudMetrics">
        Lat: -- | Lon: -- | Altitude: -- km | Camera Pitch: --°
    </div>

    <!-- Cesium Globe Container -->
    <div id="cesiumContainer"></div>

    <script>
        // Disable default token requirements
        Cesium.Ion.defaultAccessToken = '';

        // Initialize Cesium Viewer
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: false,
            baseLayerPicker: false,
            geocoder: false,
            timeline: false,
            animation: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            infoBox: false,
            selectionIndicator: false,
            homeButton: false
        });

        const scene = viewer.scene;
        scene.globe.enableLighting = true;

        // Open-source Dark Basemap (No Token Required)
        const darkBasemap = viewer.imageryLayers.addImageryProvider(
            new Cesium.UrlTemplateImageryProvider({
                url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                credit: 'CartoDB Dark Matter'
            })
        );
        darkBasemap.alpha = 0.90;

        // Dynamic 3D Buildings Night Lighting Style Definitions
        const glowingBuildingStyle = new Cesium.Cesium3DTileStyle({
            color: {
                conditions: [
                    ['${building} === "commercial" || ${building} === "office"', 'color("#ffd700", 0.95)'], // Golden Window Lights
                    ['${building} === "apartments" || ${building} === "residential"', 'color("#00e5ff", 0.90)'], // Neon Cyan Lights
                    ['${height} > 120', 'color("#ff3366", 0.95)'], // High-rise Rooftop Accent
                    ['${height} > 50', 'color("#0076d6", 0.85)'], // Corporate Blue Mid-rise
                    ['true', 'color("#1a365d", 0.80)'] // Standard Base Structure
                ]
            }
        });

        const standardBuildingStyle = new Cesium.Cesium3DTileStyle({
            color: {
                conditions: [
                    ['${building} === "residential"', 'color("#00529b", 0.8)'],
                    ['${building} === "commercial"', 'color("#0076d6", 0.85)'],
                    ['true', 'color("#c0c0c0", 0.7)']
                ]
            }
        });

        // Load OpenStreetMap 3D Buildings gracefully
        let osmBuildingsTileset;
        Cesium.createOsmBuildingsAsync().then((tileset) => {
            osmBuildingsTileset = viewer.scene.primitives.add(tileset);
            osmBuildingsTileset.style = glowingBuildingStyle;
        }).catch((err) => {
            console.warn("OSM 3D Buildings unavailable without Ion token, continuing in globe-only mode.", err);
        });

        // UI Element Selectors
        const toggleNightLights = document.getElementById('toggleNightLights');
        const lightOpacity = document.getElementById('lightOpacity');
        const lightOpacityVal = document.getElementById('lightOpacityVal');
        const toggleBuildings = document.getElementById('toggleBuildings');
        const toggleGlow = document.getElementById('toggleGlow');
        const toggleTerrain = document.getElementById('toggleTerrain');
        const hudMetrics = document.getElementById('hudMetrics');

        toggleNightLights.addEventListener('change', (e) => {
            darkBasemap.show = e.target.checked;
        });

        lightOpacity.addEventListener('input', (e) => {
            const val = e.target.value / 100;
            darkBasemap.alpha = val;
            lightOpacityVal.innerText = `${e.target.value}%`;
        });

        toggleBuildings.addEventListener('change', (e) => {
            if (osmBuildingsTileset) {
                osmBuildingsTileset.show = e.target.checked;
            }
        });

        toggleGlow.addEventListener('change', (e) => {
            if (osmBuildingsTileset) {
                osmBuildingsTileset.style = e.target.checked ? glowingBuildingStyle : standardBuildingStyle;
            }
        });

        toggleTerrain.addEventListener('change', (e) => {
            scene.globe.enableWireframe = e.target.checked;
        });

        // Navigation Functions
        let isOrbiting = false;
        let removeOrbitListener = null;

        function stopOrbit() {
            if (isOrbiting && removeOrbitListener) {
                removeOrbitListener();
                isOrbiting = false;
                document.getElementById('orbitBtn').innerText = "🎥 Toggle Cinematic Orbit";
            }
        }

        function toggleCameraOrbit() {
            if (isOrbiting) {
                stopOrbit();
            } else {
                isOrbiting = true;
                document.getElementById('orbitBtn').innerText = "⏹ Stop Cinematic Orbit";
                
                let lastTime = Date.now();
                removeOrbitListener = viewer.clock.onTick.addEventListener(() => {
                    const now = Date.now();
                    const delta = (now - lastTime) / 1000;
                    lastTime = now;
                    viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, 0.15 * delta);
                });
            }
        }

        function flyToLocation(lat, lon, height, pitch, heading) {
            stopOrbit();
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
                orientation: {
                    heading: Cesium.Math.toRadians(heading),
                    pitch: Cesium.Math.toRadians(pitch),
                    roll: 0.0
                },
                duration: 2.2
            });
        }

        function flyToGlobalView() {
            stopOrbit();
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(-87.6298, 41.8781, 15000000),
                orientation: {
                    heading: 0,
                    pitch: Cesium.Math.toRadians(-90),
                    roll: 0
                },
                duration: 2.0
            });
        }

        // Live HUD Metrics
        viewer.camera.changed.addEventListener(() => {
            const cartographic = scene.globe.ellipsoid.cartesianToCartographic(viewer.camera.position);
            if (cartographic) {
                const lat = Cesium.Math.toDegrees(cartographic.latitude).toFixed(4);
                const lon = Cesium.Math.toDegrees(cartographic.longitude).toFixed(4);
                const alt = (cartographic.height / 1000).toFixed(1);
                const pitch = Cesium.Math.toDegrees(viewer.camera.pitch).toFixed(0);

                hudMetrics.innerText = `Lat: ${lat}° | Lon: ${lon}° | Altitude: ${alt} km | Pitch: ${pitch}°`;
            }
        });

        // Initial Location Fly-to
        flyToLocation(41.8827, -87.6233, 1200, -18, 45);
    </script>
</body>
</html>
